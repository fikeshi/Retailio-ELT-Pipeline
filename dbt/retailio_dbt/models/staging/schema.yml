#Schema.yml documents and tests all staging models ensures data quality issues from manual CSV uploads are caught early

version: 2

models:
  - name: stg_customers
    description: "Cleaned and standardised customer data from raw Airbyte source"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Full name of the customer"
        tests:
          - not_null
      - name: email
        description: "Customer email address in lowercase"
        tests:
          - not_null
      - name: state
        description: "US state of the customer in lowercase"
      - name: gender
        description: "Customer gender - female, male or non-binary"
      - name: date_of_birth
        description: "Customer date of birth as a date type"

  - name: stg_products
    description: "Cleaned and standardised product data from raw Airbyte source"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Name of the product"
        tests:
          - not_null
      - name: product_category
        description: "Category the product belongs to in lowercase"
        tests:
          - not_null
      - name: price
        description: "Product price as decimal"
        tests:
          - not_null
      - name: stock_quantity
        description: "Current stock quantity as integer"
      - name: product_ratings
        description: "Product rating out of 5"
      - name: warranty_period
        description: "Warranty period - either number of years or No Warranty"
      - name: manufacturing_date
        description: "Date the product was manufactured"
      - name: expiration_date
        description: "Expiration date - null for non-perishable products"

  - name: stg_sales
    description: "Cleaned and standardised sales transactions from raw Airbyte source"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key referencing stg_customers"
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: sales_amount
        description: "Total sales amount for the order in decimal"
        tests:
          - not_null
      - name: profit
        description: "Profit made on the order in decimal"
        tests:
          - not_null
      - name: order_date
        description: "Date the order was placed"
        tests:
          - not_null
      - name: ship_date
        description: "Date the order was shipped"
        tests:
          - not_null
      - name: region
        description: "Sales region of the order"
        tests:
          - not_null
          - accepted_values:
              values: ['west', 'east', 'south', 'central']
      - name: customer_segment
        description: "Customer segment - consumer, corporate or home office"
        tests:
          - not_null
          - accepted_values:
              values: ['consumer', 'corporate', 'home office']