# schema.yml documents and tests all mart models and ensures business metrics are complete and accurate for executive decision making

version: 2

models:
  - name: mart_customer_overview
    description: "Identifies and classifies customers by value for executive decision making"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - not_null
      - name: customer_name
        description: "Full name of the customer"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue generated by the customer"
        tests:
          - not_null
      - name: total_profit
        description: "Total profit generated by the customer"
        tests:
          - not_null
      - name: customer_value_tier
        description: "Customer classification based on revenue - high value or low value"
        tests:
          - not_null
          - accepted_values:
              values: ['high value', 'low value']

  - name: mart_sales_overview
    description: "Monthly sales performance overview by region and category for management"
    columns:
      - name: total_revenue
        description: "Total revenue for the month, region and category combination"
        tests:
          - not_null
      - name: total_profit
        description: "Total profit for the month, region and category combination"
        tests:
          - not_null
      - name: total_order
        description: "Total number of orders for the month, region and category combination"
        tests:
          - not_null

  - name: mart_regional_performance
    description: "Sales performance broken down by region and category over time"
    columns:
      - name: region
        description: "Sales region"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue for the region and category combination"
        tests:
          - not_null
      - name: total_profit
        description: "Total profit for the region and category combination"
        tests:
          - not_null

  - name: mart_executive_summary
    description: "High level monthly business overview for executive decision making"
    columns:
      - name: month
        description: "First day of the month used for sorting"
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: "Total revenue across the entire business for the month"
        tests:
          - not_null
      - name: total_profit
        description: "Total profit across the entire business for the month"
        tests:
          - not_null
      - name: total_order
        description: "Total orders across the entire business for the month"
        tests:
          - not_null